quarkus.arc.selected-alternatives=io.casehub.persistence.memory.MemoryPlanItemStore,io.casehub.persistence.memory.InMemoryEventLogRepository,io.casehub.persistence.memory.InMemoryCaseMetaModelRepository,io.casehub.persistence.memory.InMemoryCaseInstanceRepository,io.casehub.persistence.memory.MemorySubCaseGroupRepository
quarkus.arc.exclude-types=io.casehub.persistence.memory.DefaultTestPrincipal,io.casehub.work.runtime.service.NoOpGroupMembershipProvider,io.casehub.work.runtime.service.TenantScopedPrincipal

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:fsitrading;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.hibernate-orm.packages=io.casehub.fsitrading.app.model,io.casehub.work.runtime.model,io.casehub.work.runtime.filter,io.casehub.platform.memory.jpa
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/fsitrading/migration,classpath:db/work/migration,classpath:db/memory/migration

quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:fsitrading-qhorus;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=
quarkus.hibernate-orm.qhorus.datasource=qhorus
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.fsitrading.app.ledger
quarkus.hibernate-orm.qhorus.database.generation=none
quarkus.flyway.qhorus.migrate-at-start=true
quarkus.flyway.qhorus.locations=classpath:db/qhorus/migration,classpath:db/ledger/migration,classpath:db/fsitrading-ledger/migration

casehub.ledger.datasource=qhorus
casehub.ledger.trust-score.enabled=true
casehub.ledger.trust-score.incremental.enabled=true
casehub.ledger.trust-score.materialization.enabled=true

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.qhorus.db-kind=postgresql
